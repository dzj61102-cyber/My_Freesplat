defaults:
  - backbone: efficientnet

name: freesplat

opacity_mapping:
  initial: 0.0
  final: 0.0
  warm_up: 1

budget_pruning:
  enabled: true
  keep_ratio: 0.8
  lambda_budget: 0.2
  lambda_bin: 0.02
  tau_start: 0.5
  tau_end: 0.2
  total_steps: 300000

num_surfaces: 1

gaussian_adapter:
  gaussian_scale_min: 0.5
  gaussian_scale_max: 15.0
  sh_degree: 2

d_feature: 128

visualizer:
  num_samples: 8
  min_resolution: 256
  export_ply: false
